<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Responsive Contact Form</title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body {
                background: url('https://www.agoda.com/wp-content/uploads/2024/04/Featured-image-Seopjikoji-Jeju-Island-South-Korea-1244x700.jpg') no-repeat center center fixed;
                background-size: cover;
                height: 100vh;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .form-container {
                background: rgba(255, 255, 255, 0.9); /* 반투명 효과 */
                padding: 2rem;
                border-radius: 10px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
                max-width: 400px;
                width: 100%;
            }

            h1 {
                font-size: 1.8rem;
                font-weight: 600;
                color: #333;
            }

            p {
                font-size: 0.9rem;
                color: #666;
            }

            .form-floating label {
                color: #555;
            }

            button {
                font-size: 1rem;
                padding: 0.6rem 1.5rem;
            }
        </style>
    </head>
    <body>
        <div class="form-container">
            <div class="text-center mb-4">
                <h1>사전 정보 폼</h1>
                <p>추천을 위한 기본적인 정보를 알려주세요</p>
            </div>
            <form id="contactForm">
                <!-- Name Input -->
                <div class="form-floating mb-3">
                    <input class="form-control" id="name" type="text" placeholder="Name" required />
                    <label for="name">Name</label>
                </div>

                <!-- Gender Toggle -->
                <div class="mb-3">
                    <label class="form-label">Gender</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="male" value="Male" required>
                        <label class="form-check-label" for="male">Male</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="female" value="Female" required>
                        <label class="form-check-label" for="female">Female</label>
                    </div>
                </div>

                <!-- Age Range Dropdown -->
                <div class="mb-3">
                    <label class="form-label" for="ageRange">Age Range</label>
                    <select class="form-select" id="ageRange" required>
                        <option value="">Select your age range</option>
                        <option value="10s">10s</option>
                        <option value="20s">20s</option>
                        <option value="30s">30s</option>
                        <option value="40s">40s</option>
                        <option value="50s">50s</option>
                        <option value="60s">60s</option>
                        <option value="70s">70s</option>
                        <option value="80s">80s</option>
                    </select>
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                    <button class="btn btn-primary btn-lg" id="submitButton" type="submit">Submit</button>
                </div>
            </form>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
